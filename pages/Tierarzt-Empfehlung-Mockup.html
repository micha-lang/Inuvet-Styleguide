<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tierarzt-Empfehlung — HTML Mockup</title>
  <link rel="stylesheet" href="https://use.typekit.net/vhh5bbc.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="../inuvet.css">
  <link rel="stylesheet" href="../mockup-ui.css">
  <link rel="stylesheet" href="Tierarzt-Empfehlung-Mockup.css">
</head>
<body class="--mockup-bar-visible">

<!-- ════════════════════════════════════════
     MOCKUP-STEUERLEISTE
     ════════════════════════════════════════ -->
<div class="mockup-bar" id="mockupBar">
  <div class="mockup-bar__group">
    <span class="mockup-bar__group-label">Zustand:</span>
    <button class="mockup-btn --active" data-state="guest"        onclick="setState('guest',        this)">① Nicht angemeldet</button>
    <button class="mockup-btn"          data-state="no-release"   onclick="setState('no-release',   this)">② Angemeldet · keine Freigabe</button>
    <button class="mockup-btn"          data-state="with-release" onclick="setState('with-release', this)">③ Angemeldet · mit Freigabe</button>
  </div>
  <div class="mockup-bar__sep"></div>
  <div class="mockup-bar__group" id="pageNav">
    <span class="mockup-bar__group-label">Seite:</span>
    <button class="mockup-btn --active" onclick="setPage('home',        this)">Startseite</button>
    <button class="mockup-btn"          onclick="setPage('collection',  this)">Alle Produkte</button>
    <button class="mockup-btn"          onclick="setPage('recommended', this)" id="btnRecommended" style="display:none">Empfohlene Produkte</button>
    <button class="mockup-btn"          onclick="setPage('product',     this)">Produktseite</button>
    <button class="mockup-btn"          onclick="openCart()"                  >Warenkorb</button>
    <button class="mockup-btn"          onclick="setPage('checkout',    this)">Checkout</button>
  </div>
  <div class="mockup-bar__sep" id="productPickerSep" style="display:none"></div>
  <div class="mockup-bar__group" id="productPicker" style="display:none">
    <span class="mockup-bar__group-label">Produkt:</span>
  </div>
  <button class="mockup-bar__collapse" onclick="toggleMockupBar()" title="Leiste ausblenden">▾ Ausblenden</button>
</div>
<button class="mockup-revive" id="mockupRevive" onclick="toggleMockupBar()" title="Steuerleiste einblenden">▴ Mockup</button>

<!-- ════════════════════════════════════════
     SHOP-HEADER
     ════════════════════════════════════════ -->
<div class="announcement-bar" id="announcementBar">
  <span class="announcement-bar__item">Kostenloser Versand ab 49 €</span>
  <span class="announcement-bar__item">30 Tage Rückgabe</span>
  <span class="announcement-bar__item">Tierärztlich entwickelt</span>
  <span class="announcement-bar__item"><span class="rating"><span class="material-icons" aria-hidden="true">star</span><span class="material-icons" aria-hidden="true">star</span><span class="material-icons" aria-hidden="true">star</span><span class="material-icons" aria-hidden="true">star</span><span class="material-icons" aria-hidden="true">star</span><span>4,9 · Über 2.400 Bewertungen</span></span></span>
  <button class="btn --icon" onclick="closeAnnouncement()" aria-label="Schließen">
    <span class="material-icons">close</span>
  </button>
</div>

<nav class="site-nav" aria-label="Hauptnavigation">
  <div class="nav-left" id="navLinks"></div>
  <div class="nav-center">
    <a href="#" onclick="setPage('home');return false;" aria-label="Zur Startseite">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 113.4 113.4"<defs><style>.st0{fill:none}.st1{fill:#78b41b}.st2{clip-path:url(#cp-shop)}</style><clipPath id="cp-shop"><rect class="st0" width="113.4" height="113.4"/></clipPath></defs><g><path d="M19.4,74.3c0,1.4-1.1,2.6-2.6,2.6s-2.6-1.2-2.6-2.6,1.1-2.5,2.6-2.5,2.5,1.2,2.5,2.5ZM14.7,78.9h4.3v15.4h-4.3s0-15.4,0-15.4Z"/><path d="M23.1,78.9h3.8l.2,2.1c1.5-1.8,3.1-2.5,5.1-2.5s3.5.7,4.2,2.1c.5.9.7,2,.7,4.1v9.7h-4.3v-8.9c0-1.3,0-1.8-.3-2.3-.3-.6-.8-.9-1.6-.9-1.2,0-2.6,1.1-3.5,2.8v9.3h-4.3v-15.4h0Z"/><path d="M50.5,92.6c-1.4,1.5-2.8,2.1-4.7,2.1s-3.4-.8-4.2-2.2c-.5-.9-.7-2.1-.7-4.2v-9.5h4.3v8.7c0,2.6.5,3.4,1.9,3.4s2.3-.6,3.1-1.9v-10.2h4.3v15.4h-3.8l-.3-1.7h0Z"/><path d="M56.8,78.9h4.8l3.6,10.3,3.6-10.3h4.3l-6.3,15.4h-3.9l-6.1-15.4h0Z"/><path d="M78.1,87.9c.2,2.6,1.5,3.7,4.4,3.7s2.7-.3,4.4-1.2l1,2.8c-1.8,1.1-3.8,1.6-6.4,1.6-5.2,0-7.8-2.5-7.8-7.7s2.8-8.6,7.5-8.6,6.8,2.6,6.8,7.6,0,.9,0,1.8h-9.9,0ZM84.2,85.1c-.2-2.4-1.1-3.5-2.9-3.5s-2.9,1.1-3.2,3.5h6.1Z"/><path d="M89.7,82.4l.3-3.4h2.5l.2-3.7,4-1.4v5.1h3.8l-.3,3.4h-3.5v5.6c0,2.8.2,3.3,1.6,3.3s1.3-.2,2.1-.5l.8,2.7c-1.5.9-3,1.3-4.5,1.3s-3-.6-3.7-1.8c-.4-.8-.6-2-.6-4.2v-6.5h-2.7,0Z"/></g><g class="st2"><g><path d="M81.4,32h-.3v1h.2c.5,0,.7-.3.7-.6s-.1-.5-.6-.5M82,35.1l-.8-1.5h0v1.5h-.8v-3.7h1.3c.9,0,1.2.4,1.2,1s-.3,1-.8,1c0,0,.2.3.3.5l.7,1.2h-1ZM78.9,33.3c0,1.4,1.1,2.6,2.6,2.6s2.6-1.2,2.6-2.6-1.1-2.6-2.6-2.6-2.6,1.2-2.6,2.6M85,33.3c0,1.9-1.6,3.5-3.5,3.5s-3.6-1.5-3.6-3.5,1.6-3.5,3.6-3.5,3.5,1.5,3.5,3.5"/><path class="st1" d="M28.7,54.5c1.3,5.2,5.6,9,11.1,10.7,4.1-4.1,6.1-9.5,4.8-14.7-1.3-5.2-5.6-9-11.1-10.7-4.1,4.1-6.1,9.5-4.8,14.7Z"/><path class="st1" d="M38.6,32.3c.7,5.3,4.4,9.7,9.7,12,4.6-3.6,7.2-8.6,6.6-14-.6-5.3-4.4-9.7-9.7-12-4.6,3.6-7.2,8.7-6.5,14Z"/><path class="st1" d="M84.6,54.5c-1.3,5.2-5.6,9-11.1,10.7-4.1-4.1-6.1-9.5-4.8-14.7,1.3-5.2,5.6-9,11.1-10.7,4.1,4.1,6.1,9.5,4.8,14.7h0Z"/><path class="st1" d="M74.8,32.3c-.7,5.3-4.4,9.7-9.7,12-4.6-3.6-7.2-8.6-6.6-14,.6-5.3,4.4-9.7,9.7-12,4.6,3.6,7.2,8.7,6.6,14h0Z"/></g></g></svg>
    </a>
  </div>
  <div class="nav-right">
    <span id="navRight"></span>
    <button class="btn --icon" aria-label="Suche" onclick="openSearch()">
      <span class="material-icons">search</span>
    </button>
    <button class="btn --icon icon-badged" aria-label="Warenkorb öffnen" onclick="openCart()">
      <span class="material-icons">shopping_cart</span>
      <span class="badge --count" id="cartCount" style="display:none">0</span>
    </button>
  </div>
</nav>

<!-- ════════════════════════════════════════
     SUCHE-OVERLAY
     ════════════════════════════════════════ -->
<div class="search-overlay" id="searchOverlay" onclick="handleSearchOverlayClick(event)">
  <div class="search-panel" id="searchPanel">
    <div class="search-panel__bar">
      <span class="material-icons">search</span>
      <input class="search-panel__input" id="searchInput" type="search" placeholder="Produkt oder Kategorie suchen …" autocomplete="off" aria-label="Suche">
      <button class="btn --icon" onclick="closeSearch()" aria-label="Suche schließen"><span class="material-icons">close</span></button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ════════════════════════════════════════
     HAUPTINHALT
     ════════════════════════════════════════ -->
<main id="shopMain"></main>

<!-- ════════════════════════════════════════
     OPTIONS-DRAWER (Varianten wählen)
     ════════════════════════════════════════ -->
<div class="options-overlay" id="optionsOverlay" onclick="closeOptions()"></div>
<div class="options-drawer" id="optionsDrawer">
  <!-- Inhalt wird per JS gerendert -->
</div>

<!-- ════════════════════════════════════════
     WARENKORB-DRAWER (Styleguide-Klassen)
     ════════════════════════════════════════ -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <!-- Inhalt wird per JS gerendert -->
</div>

<!-- ════════════════════════════════════════
     CHECKOUT-MODAL (Popup — nur bei Anfragen)
     ════════════════════════════════════════ -->
<div class="shop-modal-overlay" id="checkoutModal">
  <div class="shop-modal">
    <div class="shop-modal__icon">
      <span class="material-icons checkout__success-icon">check_circle</span>
    </div>
    <div class="shop-modal__title"   id="modalTitle"></div>
    <div class="shop-modal__body"    id="modalBody"></div>
    <div class="shop-modal__actions" id="modalActions"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   PRODUKTDATEN
   Packshot_01 = Calmin Balance · Packshot_02 = Hepax
   approved: nur Produkt A + B (State ③)
   ════════════════════════════════════════════ */
/* Calmin Balance */
const CALMIN_1 = '../assets/images/Calmin_Packshot_01.jpeg';
const CALMIN_2 = '../assets/images/Calmin_Packshot_02.png';
const CALMIN_3 = '../assets/images/Calmin_Packshot_03.png';
/* Hepax */
const HEPAX_1  = '../assets/images/Hepax_Packshot_01.jpeg';
const HEPAX_2  = '../assets/images/Hepax_Packshot_02.png';

const PRODUCTS = [
  { id:1, name:'Calmin Balance', cat:'beruhigung', catLabel:'Beruhigung', price:'39,90 €', img:CALMIN_1, imgHover:CALMIN_2, imgDetail:CALMIN_3, rating:'4,8', approved:true,
    shortDesc:'Für Entspannung und innere Balance.',
    desc:'Hochwertige Tropfen für eine entspannte und ausgeglichene Stimmung bei Hunden und Katzen. Schonend gewonnen, tierärztlich geprüft.',
    ingredients:'CBD-Hanfextrakt, MCT-Öl (Kokosöl), natürliches Aroma. Ohne künstliche Zusatzstoffe, ohne Lösungsmittel.',
    variants:[{label:'30 ml',price:'39,90 €'},{label:'60 ml',price:'69,90 €'},{label:'100 ml',price:'109,90 €'}] },
  { id:2, name:'Hepax',          cat:'leber',    catLabel:'Leber',      price:'44,90 €', img:HEPAX_1,  imgHover:HEPAX_2,                      rating:'4,6', approved:true,
    shortDesc:'Unterstützt Knorpel und Gelenke.',
    desc:'Spezialformel zur Unterstützung von Knorpel und Gelenken bei aktiven Tieren. Mit natürlichen Extrakten, tierärztlich entwickelt.',
    ingredients:'Grünlippmuschel-Extrakt, Teufelskralle, Boswellia, Vitamin C, Glucosamin, Chondroitin. Frei von Getreide und Soja.',
    variants:[{label:'60 Kapseln',price:'44,90 €'},{label:'120 Kapseln',price:'84,90 €'}] },
  { id:3, name:'Calmin Balance', cat:'beruhigung', catLabel:'Beruhigung', price:'34,90 €', img:CALMIN_1, imgHover:CALMIN_2, imgDetail:CALMIN_3, rating:'4,8', approved:false,
    shortDesc:'Für eine gesunde Verdauung.',
    desc:'Beruhigt den Verdauungstrakt und fördert eine gesunde Darmflora. Ideal bei empfindlichem Magen und nach Antibiotika-Behandlungen.',
    ingredients:'Flohsamenschalen, Probiotika (Enterococcus faecium), Präbiotika (FOS), Bentonit, Pektin, Kamillenextrakt. Ohne künstliche Zusatzstoffe.',
    variants:[{label:'30 ml',price:'34,90 €'},{label:'60 ml',price:'64,90 €'},{label:'100 ml',price:'99,90 €'}] },
  { id:4, name:'Hepax',          cat:'leber',    catLabel:'Leber',      price:'49,90 €', img:HEPAX_1,  imgHover:HEPAX_2,                      rating:'4,6', approved:false,
    shortDesc:'Zur Unterstützung der Herzfunktion.',
    desc:'Spezialformel zur Unterstützung der Herzfunktion bei älteren Tieren. Enthält natürliche Wirkstoffe, tierärztlich entwickelt.',
    ingredients:'Weißdornextrakt, Coenzym Q10, Taurin, L-Carnitin, Magnesium, Vitamin E. Ohne Konservierungsstoffe.',
    variants:[{label:'60 Kapseln',price:'49,90 €'},{label:'120 Kapseln',price:'89,90 €'}] },
  { id:5, name:'Calmin Balance', cat:'beruhigung', catLabel:'Beruhigung', price:'42,90 €', img:CALMIN_1, imgHover:CALMIN_2, imgDetail:CALMIN_3, rating:'4,8', approved:false,
    shortDesc:'Zur Unterstützung der Nierenfunktion.',
    desc:'Unterstützt die Nierenfunktion und trägt zur natürlichen Entgiftung bei. Schonende Naturextrakte für Hunde und Katzen.',
    ingredients:'Cranberry-Extrakt, Brennnesselwurzel, Schachtelhalmextrakt, Vitamin B6, Kalium. Frei von künstlichen Farbstoffen.',
    variants:[{label:'30 ml',price:'42,90 €'},{label:'60 ml',price:'79,90 €'},{label:'100 ml',price:'119,90 €'}] },
  { id:6, name:'Hepax',          cat:'leber',    catLabel:'Leber',      price:'36,90 €', img:HEPAX_1,  imgHover:HEPAX_2,                      rating:'4,6', approved:false,
    shortDesc:'Für gesunde Haut und glänzendes Fell.',
    desc:'Für glänzendes Fell und gesunde Haut. Reich an Omega-3-Fettsäuren und Biotin, tierärztlich geprüft.',
    ingredients:'Lachsöl, Borretschsamenöl, Biotin, Zink, Vitamin A, E. Kaltgepresst, ohne Konservierungsstoffe.',
    variants:[{label:'60 Kapseln',price:'36,90 €'},{label:'120 Kapseln',price:'69,90 €'}] },
];

/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
let state         = 'guest';
let page          = 'home';
let activeProduct = PRODUCTS[0];
let cartApproved  = [];
let cartRequested = [];

/* ════════════════════════════════════════════
   HILFSFUNKTIONEN
   ════════════════════════════════════════════ */
const getProduct = id  => PRODUCTS.find(p => p.id === id);
const cartTotal  = ()  => cartApproved.length + cartRequested.length;
const isApproved = p   => state === 'with-release' && p.approved;

function updateCartBadge() {
  const badge = document.getElementById('cartCount');
  const n = cartTotal();
  badge.style.display = n > 0 ? 'flex' : 'none';
  badge.textContent   = n;
}

function addToCart(id, type) {
  const arr = type === 'approved' ? cartApproved : cartRequested;
  if (!arr.includes(id)) arr.push(id);
  updateCartBadge();
  if (document.getElementById('cartDrawer').classList.contains('--open')) {
    renderCartDrawer();
  }
  toast(type === 'approved' ? 'In den Warenkorb gelegt' : 'Anfrage hinzugefügt');
}

function removeFromCart(id) {
  cartApproved  = cartApproved.filter(x => x !== id);
  cartRequested = cartRequested.filter(x => x !== id);
  updateCartBadge();
  if (document.getElementById('cartDrawer').classList.contains('--open')) {
    renderCartDrawer();
  }
}

function calcTotal(ids) {
  return ids.reduce((s, id) => s + parseFloat(getProduct(id).price.replace(',','.').replace(' €','')), 0);
}

function toast(msg) {
  let t = document.getElementById('shopToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'shopToast';
    Object.assign(t.style, {
      position:'fixed', bottom:'2rem', right:'2rem',
      background:'var(--fg)', color:'#fff',
      padding:'0.75rem 1.25rem', fontSize:'var(--text-base)',
      zIndex:'9999', transition:'opacity 0.3s', opacity:'0'
    });
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2200);
}

/* ════════════════════════════════════════════
   UI-HELFER
   ════════════════════════════════════════════ */
function closeAnnouncement() {
  document.getElementById('announcementBar').classList.add('--closed');
  document.documentElement.style.setProperty('--announcement-height', '0px');
}

function toggleMockupBar() {
  const bar    = document.getElementById('mockupBar');
  const revive = document.getElementById('mockupRevive');
  const hide   = !bar.classList.contains('--hidden');
  bar.classList.toggle('--hidden', hide);
  revive.classList.toggle('--visible', hide);
  document.body.classList.toggle('--mockup-bar-visible', !hide);
}

function pdpSetImg(thumb, src) {
  document.getElementById('pdpMainImg').src = src;
  document.querySelectorAll('.pdp__thumb').forEach(t => t.classList.remove('--active'));
  thumb.classList.add('--active');
}

function toggleAccordion(btn) {
  const item    = btn.closest('.accordion-item');
  const content = item.querySelector('.accordion-content');
  const isOpen  = item.classList.contains('--open');
  item.classList.toggle('--open', !isOpen);
  btn.setAttribute('aria-expanded', String(!isOpen));
}

/* ════════════════════════════════════════════
   WARENKORB-DRAWER
   ════════════════════════════════════════════ */
function openCart() {
  renderCartDrawer();
  document.getElementById('cartOverlay').classList.add('--open');
  document.getElementById('cartDrawer').classList.add('--open');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('--open');
  document.getElementById('cartDrawer').classList.remove('--open');
}

/* ════════════════════════════════════════════
   OPTIONS-DRAWER (Varianten wählen)
   ════════════════════════════════════════════ */
function openOptions(id) {
  const p = getProduct(id);
  renderOptionsDrawer(p);
  document.getElementById('optionsOverlay').classList.add('--open');
  document.getElementById('optionsDrawer').classList.add('--open');
}

function closeOptions() {
  document.getElementById('optionsOverlay').classList.remove('--open');
  document.getElementById('optionsDrawer').classList.remove('--open');
}

function selectVariant(btn, price) {
  btn.closest('.options-variants').querySelectorAll('.options-variant-btn')
    .forEach(b => b.classList.remove('--active'));
  btn.classList.add('--active');
  const priceEl = document.getElementById('optionsPrice');
  if (priceEl) priceEl.textContent = price;
}

function renderOptionsDrawer(p) {
  const approved = isApproved(p);
  const variants = p.variants || [];
  const firstPrice = variants.length > 0 ? variants[0].price : p.price;

  const variantBtns = variants.map((v, i) =>
    `<button class="options-variant-btn${i === 0 ? ' --active' : ''}" type="button"
      onclick="selectVariant(this,'${v.price}')">${v.label}</button>`
  ).join('');

  const ctaType  = approved ? 'approved' : 'requested';
  const ctaClass = approved ? 'btn --primary' : 'btn --secondary --with-icon';
  const ctaIcon  = approved ? '' : '<span class="material-icons">mail_outline</span> ';
  const ctaLabel = approved ? 'In den Warenkorb' : 'Produkt anfragen';

  document.getElementById('optionsDrawer').innerHTML = `
    <div class="cart-drawer__header">
      <h2 class="cart-drawer__title">Optionen wählen</h2>
      <button class="btn --icon" onclick="closeOptions()" aria-label="Schließen">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="options-drawer__product">
      <div class="options-drawer__thumb product-thumb">
        <img src="${p.img}" alt="${p.name}">
      </div>
      <div class="options-drawer__product-info">
        <div class="badge" data-cat="${p.cat}" style="margin-bottom:0.3rem">${p.catLabel}</div>
        <p class="options-drawer__product-name">${p.name}</p>
        ${p.rating ? `<div class="rating"><span class="material-icons" aria-hidden="true">star</span><span>${p.rating}</span></div>` : ''}
        <div class="options-drawer__price" id="optionsPrice">${firstPrice}</div>
      </div>
    </div>
    ${variants.length > 0 ? `
    <div class="options-drawer__section">
      <div class="label-caps options-drawer__section-label">Größe</div>
      <div class="options-variants">${variantBtns}</div>
    </div>` : ''}
    <div class="options-drawer__section">
      <div class="label-caps options-drawer__section-label">Menge</div>
      <div class="qty-selector">
        <button class="qty-selector__btn" type="button" aria-label="Weniger"
          onclick="this.nextElementSibling.value=Math.max(1,+this.nextElementSibling.value-1)">
          <span class="material-icons">remove</span>
        </button>
        <input class="qty-selector__input" type="number" value="1" min="1" max="99">
        <button class="qty-selector__btn" type="button" aria-label="Mehr"
          onclick="this.previousElementSibling.value=Math.min(99,+this.previousElementSibling.value+1)">
          <span class="material-icons">add</span>
        </button>
      </div>
    </div>
    <div class="options-drawer__footer">
      <button class="${ctaClass}"
        onclick="addToCart(${p.id},'${ctaType}');closeOptions();openCart()">
        ${ctaIcon}${ctaLabel}
      </button>
    </div>`;
}

function renderCartDrawer() {
  const hasApproved  = cartApproved.length  > 0;
  const hasRequested = cartRequested.length > 0;
  const drawer       = document.getElementById('cartDrawer');

  if (!hasApproved && !hasRequested) {
    drawer.innerHTML = `
      <div class="cart-drawer__header">
        <h2 class="cart-drawer__title">Warenkorb <span class="cart-drawer__count">(0)</span></h2>
        <button class="btn --icon" onclick="closeCart()" aria-label="Schließen"><span class="material-icons">close</span></button>
      </div>
      <div class="cart-drawer__empty">
        <p class="text-muted">Dein Warenkorb ist leer.</p>
      </div>`;
    return;
  }

  let items = '';

  if (hasApproved) {
    items += `<h3 class="section-label">Einzulösende Produkte</h3>`;
    items += cartApproved.map(id => drawerItemHTML(id, 'approved')).join('');
  }
  if (hasRequested) {
    items += `<h3 class="section-label">Anzufragende Produkte</h3>`;
    items += cartRequested.map(id => drawerItemHTML(id, 'requested')).join('');
  }

  const totalApproved = calcTotal(cartApproved);

  /* Checkout-Aktion:
     Nur empfohlene Produkte → direkt zur Checkout-Seite
     Angefragte vorhanden    → Popup (Anfrage + ggf. Checkout) */
  const checkoutFn = hasRequested
    ? `closeCart();openCheckoutModal()`
    : `closeCart();setPage('checkout')`;

  drawer.innerHTML = `
    <div class="cart-drawer__header">
      <h2 class="cart-drawer__title">Warenkorb <span class="cart-drawer__count">(${cartTotal()})</span></h2>
      <button class="btn --icon" onclick="closeCart()" aria-label="Schließen"><span class="material-icons">close</span></button>
    </div>
    <div class="cart-drawer__items">${items}</div>
    <div class="cart-drawer__footer">
      ${hasApproved ? `
      <div class="cart-drawer__shipping">
        <div class="shipping-hint"><span class="material-icons">local_shipping</span> Kostenloser Versand</div>
      </div>
      <div class="summary-total"><span>Gesamt (einzulösend)</span><span>${totalApproved.toFixed(2).replace('.',',')} €</span></div>
      <div class="cart-drawer__tax">inkl. MwSt.</div>` : ''}
      <button class="btn --primary cart-drawer__checkout" onclick="${checkoutFn}">Zur Kasse</button>
      <div class="cart-drawer__continue-wrap">
        <button class="btn --ghost cart-drawer__continue" onclick="closeCart()">Weiter einkaufen</button>
      </div>
    </div>`;
}

   ZUSTAND & SEITE WECHSELN
   ════════════════════════════════════════════ */
function setState(s, btn) {
  state = s;
  cartApproved = []; cartRequested = [];
  updateCartBadge();

  document.querySelectorAll('[data-state]').forEach(b => b.classList.remove('--active'));
  if (btn) btn.classList.add('--active');

  const btnRec = document.getElementById('btnRecommended');
  btnRec.style.display = state === 'with-release' ? '' : 'none';
  if (state !== 'with-release' && page === 'recommended') setPage('collection');

  render();
}

function setPage(p, btn) {
  page = p;
  document.querySelectorAll('#pageNav .mockup-btn').forEach(b => b.classList.remove('--active'));
  if (btn) btn.classList.add('--active');

  const picker    = document.getElementById('productPicker');
  const pickerSep = document.getElementById('productPickerSep');
  if (p === 'product') {
    picker.style.display = pickerSep.style.display = '';
    renderProductPicker();
  } else {
    picker.style.display = pickerSep.style.display = 'none';
  }

  document.getElementById('checkoutModal').classList.remove('--open');
  closeCart();
  window.scrollTo({ top: 0 });
  render();
}

function renderProductPicker() {
  const picker = document.getElementById('productPicker');
  picker.innerHTML = '<span class="mockup-bar__group-label">Produkt:</span>';
  PRODUCTS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'mockup-btn' + (activeProduct.id === p.id ? ' --active' : '');
    btn.textContent = `${p.name} (${p.catLabel})`;
    btn.onclick = () => {
      activeProduct = p;
      picker.querySelectorAll('.mockup-btn').forEach(b => b.classList.remove('--active'));
      btn.classList.add('--active');
      render();
    };
    picker.appendChild(btn);
  });
}

function breadcrumb(items) {

function initSliders() {
  document.querySelectorAll('.testimonial-slider').forEach(function(slider) {
    var track   = slider.querySelector('.testimonial-slider__track');
    var slides  = slider.querySelectorAll('.testimonial-slider__slide');
    var prevBtn = slider.querySelector('[data-dir="prev"]');
    var nextBtn = slider.querySelector('[data-dir="next"]');
    var counter = slider.querySelector('.slider-counter');
    var current = 0;

    function getVisible() {
      var w = window.innerWidth;
      if (w <= 767) return slides.length;
      return w <= 1535 ? 2 : 3;
    }
    function getMaxPage() { return Math.max(0, slides.length - getVisible()); }
    function update() {
      var vis     = getVisible();
      var maxPage = getMaxPage();
      if (current > maxPage) current = maxPage;
      if (slides.length > 0 && vis < slides.length) {
        var slideWidth = slides[0].offsetWidth;
        var gap = slides.length > 1 ? slides[1].offsetLeft - slides[0].offsetLeft - slideWidth : 0;
        track.style.transform = 'translateX(-' + (current * (slideWidth + gap)) + 'px)';
      } else {
        track.style.transform = 'translateX(0)';
      }
      if (counter) counter.textContent = (current + 1) + ' – ' + Math.min(current + vis, slides.length) + ' / ' + slides.length;
      if (prevBtn) prevBtn.disabled = current === 0;
      if (nextBtn) nextBtn.disabled = current >= maxPage;
    }
    if (prevBtn) prevBtn.addEventListener('click', function() { if (current > 0) { current--; update(); } });
    if (nextBtn) nextBtn.addEventListener('click', function() { if (current < getMaxPage()) { current++; update(); } });
    var startX = 0;
    track.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
    track.addEventListener('touchend',   function(e) {
      var diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) { if (diff > 0 && current < getMaxPage()) current++; else if (diff < 0 && current > 0) current--; update(); }
    }, { passive: true });
    window.addEventListener('resize', function() { update(); });
    update();
  });
}

/* ════════════════════════════════════════════
   CHECKOUT-MODAL (nur bei angefragten Produkten)
   ════════════════════════════════════════════ */
function openCheckoutModal() {
  const hasApproved  = cartApproved.length  > 0;
  const hasRequested = cartRequested.length > 0;
  const modal        = document.getElementById('checkoutModal');

  const names = cartRequested.map(id => getProduct(id).name).join(', ');
  document.getElementById('modalTitle').textContent = 'Produkte erfolgreich angefragt!';
  document.getElementById('modalBody').innerHTML =
    `<strong>Produkte erfolgreich bei Tierarzt Dr. med. vet. Martina Müller (Tierarztpraxis Grüntal) angefragt.</strong><br><br>
     Angefragte Produkte: ${names}.<br><br>
     Deine Praxis wurde benachrichtigt und meldet sich bei dir.`;

  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';

  if (hasApproved) {
    const btn = document.createElement('button');
    btn.className   = 'btn --primary --full';
    btn.textContent = 'Zum Check-Out';
    btn.onclick     = () => { modal.classList.remove('--open'); setPage('checkout'); };
    actions.appendChild(btn);
  }

  const back = document.createElement('button');
  back.className   = 'btn --ghost --full';
  back.textContent = 'Zurück zum Shop';
  back.onclick     = () => { modal.classList.remove('--open'); setPage('home'); };
  actions.appendChild(back);

  modal.classList.add('--open');
}

document.getElementById('checkoutModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('--open');
});

   HAUPT-RENDER

function render() {
  renderNav();
  const main = document.getElementById('shopMain');
  switch (page) {
    case 'home':        main.innerHTML = renderHome();        break;
    case 'collection':  main.innerHTML = renderCollection();  break;

}

/* ════════════════════════════════════════════
   SUCHE
   ════════════════════════════════════════════ */
const SEARCH_DATA = {
  queries: [
    { text: 'Beruhigung & Entspannung' },
    { text: 'Leber & Stoffwechsel' },
    { text: 'Tierärztlich empfohlene Produkte' },
  ],
  products: PRODUCTS.filter((p, i, arr) => arr.findIndex(x => x.name === p.name) === i)
    .map(p => ({ name: p.name, meta: p.catLabel, price: p.price, img: p.img, imgHover: p.imgHover, id: p.id }))
};

let searchActiveIndex = -1;

function openSearch() {
  document.getElementById('searchOverlay').classList.add('--open');
  setTimeout(() => document.getElementById('searchInput').focus(), 300);
  document.body.style.overflow = 'hidden';
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('--open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  searchActiveIndex = -1;
  document.body.style.overflow = '';
}

function handleSearchOverlayClick(e) {
  if (e.target === document.getElementById('searchOverlay')) closeSearch();
}

function renderSearchResults(query) {
  const container = document.getElementById('searchResults');
  if (!query.trim()) { container.innerHTML = ''; return; }

  const q = query.toLowerCase();
  const matchedProducts = SEARCH_DATA.products.filter(p =>
    p.name.toLowerCase().includes(q) || p.meta.toLowerCase().includes(q)
  );
  const matchedQueries = SEARCH_DATA.queries.filter(qr =>
    qr.text.toLowerCase().includes(q)
  );

  if (!matchedProducts.length && !matchedQueries.length) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="material-icons">search_off</span>
        <p>Keine Ergebnisse für „${query}"</p>
      </div>`;
    return;
  }

  let html = '';
  if (matchedQueries.length) {
    html += `<div class="search-results__section"><div class="section-label">Vorschläge</div>`;
    matchedQueries.forEach((qr, i) => {
      html += `<div class="search-result" role="option" data-index="${i}" onclick="closeSearch()">
        <div class="icon-box --lg"><span class="material-icons">search</span></div>
        <div class="search-result__info"><p class="search-result__name">${qr.text}</p></div>
      </div>`;
    });
    html += `</div>`;
  }
  if (matchedProducts.length) {
    html += `<div class="search-results__section"><div class="section-label">Produkte</div>`;
    matchedProducts.forEach((p, i) => {
      html += `<div class="search-result" role="option" data-index="${matchedQueries.length + i}"
        onclick="closeSearch();activeProduct=PRODUCTS[${p.id - 1}];setPage('product')">
        <div class="search-result__image product-thumb">
          <img src="${p.img}" alt="${p.name}">
          ${p.imgHover ? `<img src="${p.imgHover}" alt="">` : ''}
        </div>
        <div class="search-result__info">
          <p class="search-result__name">${p.name}</p>
          <div class="search-result__meta">${p.meta}</div>
        </div>
        <div class="search-result__price">${p.price}</div>
      </div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
  searchActiveIndex = -1;
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('searchInput');
  if (!input) return;
  let debounceTimer;
  input.addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => renderSearchResults(e.target.value), 200);
  });
  input.addEventListener('keydown', e => {
    const items = document.querySelectorAll('#searchResults .search-result');
    if (e.key === 'Escape') { closeSearch(); return; }
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); searchActiveIndex = Math.min(searchActiveIndex + 1, items.length - 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); searchActiveIndex = Math.max(searchActiveIndex - 1, -1); }
    else if (e.key === 'Enter' && searchActiveIndex >= 0) { items[searchActiveIndex].click(); return; }
    items.forEach((item, i) => item.classList.toggle('--active', i === searchActiveIndex));
    if (searchActiveIndex >= 0) items[searchActiveIndex].scrollIntoView({ block: 'nearest' });
  });
});

/* Escape schließt Options-Drawer */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('optionsDrawer').classList.contains('--open')) {
    closeOptions();
  }
});

render();
initSliders();
</script>
